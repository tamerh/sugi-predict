##############################################################################
#
#   BioYoda Configuration File
#   Central configuration for all pipeline modules
#
##############################################################################

# Project Settings
project_name: "bioyoda"
conda_env: "bioyoda"

# Base Paths - CHANGE THIS FOR DIFFERENT ENVIRONMENTS
# All outputs (raw_data/, data/, logs/) will be created under: base_dir/out/
base_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev2/out"

# PubMed Module Configuration
pubmed:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # Model settings
  # models: "pritamdeka/S-BioBERT-snli-multinli-stsb", "NeuML/pubmedbert-base-embeddings" "NCBI/MedCPT-PubMedBERT-base"
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings
  batch_size: 1000

  # Job resources
  process_memory_mb: 12288  # 12GB
  process_runtime: 10080     # 168 hours in minutes
  merge_memory_mb: 262144    # 256GB
  merge_runtime: 10080       # 168 hours in minutes

  # Incremental update settings
  update:
    download_updates_only: true  # Skip baseline in update mode

  # Qdrant insertion settings
  qdrant:
    collection_name: "pubmed_abstracts"

    # HNSW parameters (optimized from benchmark: m=32, ef_construct=256)
    hnsw_m: 32                      # Graph connectivity (32 = balanced performance)
    hnsw_ef_construct: 256          # Index build quality (256 = balanced)

    # Segment optimization (critical for performance!)
    indexing_threshold: 3000000     # 3M points - start HNSW indexing (reduces segments)
    max_segment_size: 35000000      # 35M points - max segment size (fits 31.5M collection)
    default_segment_number: 0       # Let Qdrant decide segment count

    # Insertion settings
    batch_size: 500                 # Batch size for insertion (balanced for NFS)
    prefer_grpc: true               # Use gRPC for 20-30% faster bulk inserts

    # Snakemake job resources
    memory_mb: 8192

  # Debug settings
  debug_mode: false         # Set to true to download/process limited files
  debug_sample_size: 2     # Number of files to process in debug mode

# Clinical Trials Module Configuration
clinical_trials:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # Model settings (same as PubMed for consistency)
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings
  batch_size: 1000
  encode_batch_size: 64        # Batch size for model encoding (32-64 optimal for CPU, 128-256 for GPU)
  num_workers: 1               # Number of CPU workers per chunk (1 for chunked processing)
  max_chunk_length: 500
  min_text_length: 50
  min_summary_length: 100

  # Chunking strategy for parallel processing (NEW)
  enable_chunking: true        # Enable chunked processing for better parallelization
  trials_per_chunk: 5000      # Trials per chunk (CPU: 10K-20K for many parallel jobs)

  # Text extraction flags
  include_detailed_description: true
  include_outcomes: true
  include_eligibility: true
  include_interventions: true
  exclude_withdrawn: true
  include_conditions: true

  # Job resources - PRODUCTION
  download_memory_mb: 16384    # 16GB for download + extraction
  download_runtime: 240        # 4 hours
  extract_memory_mb: 16384     # 16GB for table joins
  extract_runtime: 240         # 4 hours
  process_memory_mb: 12288     # 12GB per chunk (reduced from 20GB since processing smaller chunks)
  process_runtime: 480         # 8 hours per chunk (reduced from 7 days)
  merge_memory_mb: 32768       # 32GB for merging all chunks
  merge_runtime: 240           # 4 hours for merge

  # Incremental update settings
  update:
    chunk_prefix: "trials_update"
    keep_update_chunks: true  # Keep dated update chunks for history
    update_chunk_size: 5000  # Trials per update chunk (same as regular chunks)

  # Qdrant insertion settings
  qdrant:
    collection_name: "clinical_trials"

    # HNSW parameters (same as PubMed - optimized from benchmark)
    hnsw_m: 32                      # Graph connectivity (32 = balanced performance)
    hnsw_ef_construct: 256          # Index build quality (256 = balanced)

    # Segment optimization (adjusted for smaller ~500K dataset)
    indexing_threshold: 1000000     # 1M points - start HNSW indexing
    max_segment_size: 2000000       # 2M points - max segment size
    default_segment_number: 0       # Let Qdrant decide segment count

    # Insertion settings
    batch_size: 500                 # Batch size for insertion (balanced for NFS)
    prefer_grpc: true               # Use gRPC for 20-30% faster bulk inserts

    # Snakemake job resources
    memory_mb: 8192

# Patents Module Configuration
patents:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # ============================================================================
  # TWO SEPARATE PROCESSING PIPELINES:
  # 1. Text embeddings (patents_text collection) - Neural network model
  # 2. Chemical fingerprints (patents_compounds collection) - RDKit algorithm
  # ============================================================================

  # TEXT EMBEDDINGS - For semantic patent search (process_patents.py)
  # Uses neural network to convert patent text → 768-dim vectors
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"  # Transformer model
  vector_dimension: 768         # Output dimension for TEXT embeddings

  # Chunking strategy for parallel processing (PRODUCTION)
  patents_per_chunk: 250000    # 250K patents per chunk (~172 chunks for 43M patents)

  # Processing settings for text
  batch_size: 10000             # Patents per batch for text processing
  encode_batch_size: 128        # Batch size for model encoding (128 optimal for CPU, 256 for GPU)
  num_workers: 1                # Number of CPU threads for PyTorch (intra-op parallelism, 2-4x speedup)
  max_chunk_length: 500         # Maximum text chunk length
  min_text_length: 50           # Minimum text length for inclusion

  # CHEMICAL FINGERPRINTS - For structure similarity search (process_compounds.py)
  # Uses RDKit Morgan fingerprints (ECFP4) - deterministic algorithm, NOT a neural network
  fingerprint_bits: 2048        # Output dimension for CHEMICAL fingerprints (2048-bit vectors)
  morgan_radius: 2              # Morgan fingerprint radius (2 = ECFP4, diameter 4)

  # Compound chunking strategy for parallel processing (PRODUCTION)
  compounds_per_chunk: 500000  # 500K compounds per chunk (~62 chunks for 30.8M compounds)

  # USPTO INTEGRATION (NEW!) - Enriches US patents with full text
  # Adds abstracts, claims, descriptions to US patents (SureChEMBL only has titles)
  enable_uspto: true            # Enable USPTO enrichment (false = SureChEMBL title-only)
  uspto_historical_json_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev2/snapshots/raw_data/patents/historical_uspto"  # USPTO-Chem historical JSON directory (2001-2025)

  # Job resources - PRODUCTION
  download_memory_mb: 65536     # 64GB for downloading SureChEMBL files
  process_memory_mb: 32768      # 32GB for text processing (increased for full 43M patents + USPTO enrichment)
  process_compounds_memory_mb: 262144  # 256GB for compounds processing (30M compounds × 2048-bit fingerprints)
  
  # Release management
  cleanup_old: true             # Cleanup old releases after processing
  keep_releases: 2              # Keep latest 2 releases

  # Qdrant insertion settings
  # NOTE: Separate configs for text and compounds collections (different dimensions and requirements)
  qdrant:
    # ==========================================================================
    # TEXT COLLECTION (patents_text) - 768-dim S-BioBERT embeddings
    # ==========================================================================
    text_collection_name: "patents_text"

    # HNSW parameters for text (768-dim, working well with in-memory HNSW)
    text_hnsw_m: 32                      # Graph connectivity
    text_hnsw_ef_construct: 256          # Index build quality
    text_hnsw_on_disk: false             # In-memory HNSW (768-dim is manageable)

    # Segment optimization for text (~38M points)
    text_indexing_threshold: 3000000     # 3M points - start HNSW indexing
    text_max_segment_size: 35000000      # 35M points - max segment size
    text_default_segment_number: 0       # Let Qdrant decide

    # ==========================================================================
    # COMPOUNDS COLLECTION (patents_compounds) - 2048-dim Morgan fingerprints
    # ==========================================================================
    compounds_collection_name: "patents_compounds"

    # HNSW parameters for compounds (2048-dim, needs on-disk to avoid OOM!)
    compounds_hnsw_m: 32                 # Graph connectivity (same quality as text)
    compounds_hnsw_ef_construct: 256     # Index build quality (same quality as text)
    compounds_hnsw_on_disk: true         # ON-DISK HNSW - critical for 2048-dim to avoid OOM!

    # Segment optimization for compounds (~34M points)
    compounds_indexing_threshold: 30000000  # 30M points - delay indexing
    compounds_max_segment_size: 20000000    # 20M points - max segment size
    compounds_default_segment_number: 0     # Let Qdrant decide

    # ==========================================================================
    # SHARED SETTINGS (both collections)
    # ==========================================================================
    batch_size: 500                      # Batch size for insertion (balanced for NFS)
    prefer_grpc: true                    # Use gRPC for 20-30% faster bulk inserts
    memory_mb: 8192                      # Snakemake job resources

  # Test mode settings (set via test_config.yaml)
  test_mode: false
  test_limit_files: 4           # Limit Parquet files in test mode
  test_limit_patents: 100       # Limit patents to process in test mode
  test_limit_compounds: 1000    # Limit compounds to process in test mode

# Protein Similarity ESM-2 Module Configuration
protein_similarity_esm2:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # Dataset selection
  # Options: swissprot (~573K reviewed proteins), trembl (~220M unreviewed), both (complete UniProt), test (500 proteins)
  dataset: "swissprot"

  # ESM-2 model configuration
  # Model options:
  #   - esm2_t30_150M_UR50D: 150M params, 640-dim (fastest, good quality) - CURRENTLY USED
  #   - esm2_t33_650M_UR50D: 650M params, 1280-dim (balanced, recommended)
  #   - esm2_t36_3B_UR50D: 3B params, 2560-dim (slowest, best quality)
  model_name: "esm2_t33_650M_UR50D"
  vector_dimension: 1280         # Must match model output (t30=640, t33=1280, t36=2560)
  repr_layer: 33                # Representation layer (30 for t30, 33 for t33, 36 for t36)

  # Processing settings
  batch_size: 16                # Batch size for embedding generation (GPU: 32-64, CPU: 8-16)
  max_seq_len: 1024             # Truncate long sequences (ESM-2 max: 1024 residues)
  device: "auto"                # Device selection: cuda, cpu, or auto (auto detects GPU)

  # Chunking strategy for parallel processing
  num_chunks: 100               # Number of FASTA chunks for parallel embedding generation (100 chunks ~=5700 proteins/chunk ~=1.5-2hr/chunk on CPU)
  proteins_per_qdrant_chunk: 50000  # Proteins per FAISS chunk for Qdrant insertion

  # Job resources
  download_memory_mb: 8192      # 8GB for UniProt download
  download_runtime: 240         # 4 hours
  process_memory_mb: 32768      # 32GB for ESM-2 model + embeddings
  process_runtime: 10080        # 7 days for large datasets
  merge_memory_mb: 65536        # 64GB for merging all embeddings
  merge_runtime: 240            # 4 hours

  # Qdrant insertion settings
  qdrant:
    collection_name: "protein_similarity_esm2"

    # HNSW parameters (optimized for protein embeddings)
    hnsw_m: 32                      # Graph connectivity
    hnsw_ef_construct: 256          # Index build quality
    hnsw_on_disk: false             # In-memory HNSW (640-dim is manageable)

    # Segment optimization (for ~573K SwissProt proteins)
    indexing_threshold: 500000      # 500K points - start HNSW indexing
    max_segment_size: 1000000       # 1M points - max segment size
    default_segment_number: 0       # Let Qdrant decide

    # Insertion settings
    batch_size: 500                 # Batch size for insertion
    prefer_grpc: true               # Use gRPC for faster bulk inserts

    # Snakemake job resources
    memory_mb: 8192

  # Test mode settings
  test_mode: false
  test_limit_proteins: 1000     # Limit proteins in test mode

# ==============================================================================
# Protein Similarity - DIAMOND
# ==============================================================================
# DIAMOND-based protein similarity search (all-vs-all BLASTP)
# Output: BioBTree JSON format for identifier mapping

protein_similarity_diamond:
  # Dataset selection
  dataset: "swissprot"           # swissprot, trembl, or test

  # Chunking for parallel processing
  num_chunks: 100                # Number of FASTA chunks (parallel DIAMOND jobs)

  # DIAMOND search parameters
  diamond:
    max_target_seqs: 1000        # Maximum number of target sequences per query
    evalue: 0.001                # E-value threshold
    sensitivity: "sensitive"     # Sensitivity mode: fast, mid-sensitive, sensitive, more-sensitive, very-sensitive, ultra-sensitive
    threads: 4                   # Threads per DIAMOND job
    outfmt: 6                    # Output format (6 = tabular BLAST format)

  # Filtering parameters
  filter:
    top_k: 100                   # Keep top-K similarities per protein
    min_identity: 30.0           # Minimum percent identity (0-100)

  # BioBTree output
  biobtree:
    enabled: true                # Generate BioBTree JSON output
    output_format: "json"        # Output format

  # Job resources (per-job limits for SLURM)
  resources:
    download:
      memory_mb: 8192
      runtime_minutes: 10080     # 7 days for large downloads

    split_fasta:
      memory_mb: 8192
      runtime_minutes: 10080

    create_db:
      memory_mb: 32768           # 32GB for DIAMOND database creation
      runtime_minutes: 10080

    diamond_search:
      memory_mb: 32768           # 32GB per chunk search
      runtime_minutes: 10080
      threads: 4

    merge_results:
      memory_mb: 65536           # 64GB for merging large results
      runtime_minutes: 10080

    filter_top_k:
      memory_mb: 65536           # 64GB for filtering
      runtime_minutes: 10080

    convert_biobtree:
      memory_mb: 16384
      runtime_minutes: 10080

  # Test mode settings
  test_mode: false

# Qdrant Module Configuration
qdrant:
  # NOTE: Directories are constructed from base_dir in Snakefile
  # NOTE: Collection-specific settings (HNSW, segments, batch_size) are in each collection's config above

  # Storage configuration (production - uses local scratch for 10-60x faster performance!)
  storage:
    local_scratch_base: "/localscratch/tgur"  # Local scratch base path
    # When set: Uses /localscratch/tgur/qdrant_<hostname>_<YYYYMMDD>/ (node-specific)
    # When empty: Uses NFS storage at {base_dir}/data/qdrant (accessible from all nodes)
    # NOTE: test_overrides.yaml sets this to empty for development/testing

  # Server settings (for auto-start via Snakemake)
  server:
    memory_mb: 131072      # 128GB for server

  # Connection settings
  connection:
    url: "http://localhost:6333"
    timeout: 300           # 5 minutes for large batch operations

# NOTE: final_dir is constructed from base_dir in Snakefile

# HPC Cluster Configuration
cluster:
  type: "sge"
  default_queue: "scc"
  max_jobs: 100

  # Resource defaults
  default_memory_mb: 8192
  default_threads: 1

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  title: "BioYoda Search API"
  version: "0.1.0"
  description: "Semantic search API for biomedical literature and clinical trials"

# Qdrant Connection (for API)
qdrant_api:
  url: "http://localhost:6333"
  timeout: 180  # Increased for 27M document collection
  connection_info_path: "out/data/qdrant/connection_info.txt"

# Search Settings (for API)
search:
  # NOTE: model_name is read from pubmed.model_name or clinical_trials.model_name
  # to ensure it matches what was used during indexing
  default_limit: 10
  max_limit: 100
  cache_model: true
  batch_size: 32

# Collection Metadata (for API)
collections:
  pubmed_abstracts:
    name: "pubmed_abstracts"
    description: "PubMed abstracts and citations"
    primary_fields: ["pmid", "chunk_text"]
    search_fields: ["chunk_text"]
    display_name: "PubMed Abstracts"

  clinical_trials:
    name: "clinical_trials"
    description: "ClinicalTrials.gov clinical trials database"
    primary_fields: ["nct_id", "chunk_text", "chunk_type"]
    search_fields: ["chunk_text"]
    display_name: "Clinical Trials"

  patents_text:
    name: "patents_text"
    description: "Patent text semantic search (S-BioBERT 768-dim embeddings) - Search by concepts/keywords"
    primary_fields: ["patent_id", "text", "chunk_type"]
    search_fields: ["text"]
    display_name: "Patents (Text)"
    vector_type: "embeddings"
    vector_dimension: 768
    search_type: "semantic"

  patents_compounds:
    name: "patents_compounds"
    description: "Chemical structure similarity search (Morgan/ECFP4 2048-bit fingerprints) - Search by molecular structure"
    primary_fields: ["surechembl_id", "smiles", "molecular_weight"]
    search_fields: ["smiles"]
    display_name: "Patent Compounds (Chemical)"
    vector_type: "fingerprints"
    vector_dimension: 2048
    search_type: "chemical_similarity"

  protein_embeddings:
    name: "protein_embeddings"
    description: "Protein functional similarity search (ESM-2 640-dim embeddings) - Search by protein function and structure"
    primary_fields: ["protein_id", "uniprot_id", "entry_name"]
    search_fields: ["protein_id"]
    display_name: "Protein Embeddings (ESM-2)"
    vector_type: "embeddings"
    vector_dimension: 640
    search_type: "functional_similarity"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "out/logs/api/api.log"

# RAG (Retrieval-Augmented Generation) Configuration
rag:
  # LLM Provider Configuration (easily switchable)
  #provider: "anthropic"  # anthropic | openai | gemini | local
  #model: "claude-3-5-sonnet-20241022"
  #api_key: "${ANTHROPIC_API_KEY}"  # Set via environment variable

  # Alternative provider configurations (comment/uncomment as needed):

  # OpenAI GPT-4:
  # provider: "openai"
  # model: "gpt-4-turbo-preview"
  # api_key: "${OPENAI_API_KEY}"

  # Google Gemini (from AI Studio):
  provider: "gemini"
  model: "gemini-2.0-flash-lite"  # or "gemini-1.5-pro"
  api_key: "AIzaSyDwpxZ9xw511Btlrdcr2rInc8Ck2WOgh0A"

  # Local model via Ollama:
  # provider: "local"
  # model: "llama3.1:70b"
  # base_url: "http://localhost:11434"

  # RAG Parameters
  default_top_k: 5          # Number of documents to retrieve
  max_top_k: 20             # Maximum allowed top_k
  default_temperature: 0.1  # Low temperature for factual answers
  default_max_tokens: 1000  # Default max tokens in response
  max_context_length: 100000  # Maximum context length (chars)

  # Default collections to search
  default_collections:
  - "pubmed_abstracts"
  - "clinical_trials"

  # Safety and validation
  enable_validation: true   # Enable citation validation
  require_citations: true   # Require citations in responses

  # Document Aggregation Settings
  enable_aggregation: true      # Enable chunk deduplication and aggregation
  retrieval_multiplier: 4       # Retrieve 4× more chunks before aggregation
  aggregation_strategy: "max"   # Scoring: "max" | "avg" | "sum"

  # Performance settings
  search_timeout: 30        # Search timeout in seconds
  llm_timeout: 120          # LLM timeout in seconds
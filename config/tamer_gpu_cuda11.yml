name: bioyoda_gpu_cuda11
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - cudatoolkit=11.8
  - pytorch::pytorch[build=*cuda11.8*]
  - pytorch::torchvision
  - pytorch::torchaudio
  - faiss-gpu=*=*cuda11*
  - sentence-transformers
  - requests
  - tqdm
  - pandas
  - lxml
  - psutil
  - qdrant-client
  - psycopg2-binary
  - beautifulsoup4
  - postgresql
  - snakemake>=9.0
  - graphviz
  - pip
  - pip:
    - snakemake-executor-plugin-cluster-generic

name: bioyoda_gpu_cuda11
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - cudatoolkit=11.8
  - pytorch::pytorch[build=*cuda11.8*]
  - pytorch::torchvision
  - pytorch::torchaudio
  - faiss-gpu=*=*cuda11*
  - sentence-transformers
  - requests
  - tqdm
  - pandas
  - lxml
  - psutil
  - qdrant-client
  - psycopg2-binary
  - beautifulsoup4
  - postgresql
  - snakemake>=9.0
  - graphviz

  # API dependencies (modules/api/)
  - fastapi
  - uvicorn
  - pydantic  # Let conda resolve compatible version
  - pydantic-settings
  - pyyaml
  - ruamel.yaml  # YAML with comment preservation (for snapshot feature)

  - pip
  - pip:
    - snakemake-executor-plugin-cluster-generic
    - python-multipart>=0.0.6  # FastAPI file uploads (API)

name: bioyoda_gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12
  - pytorch-cuda=12.4
  - pytorch
  - torchvision
  - torchaudio
  - faiss-gpu
  - sentence-transformers
  - requests
  - tqdm
  - pandas
  - lxml
  - psutil
  - qdrant-client
  - psycopg2-binary
  - beautifulsoup4
  - postgresql
  - snakemake>=9.0
  - graphviz

  # Patents module dependencies
  - rdkit  # Chemical structure processing
  - pyarrow  # Parquet file reading
  - fastparquet  # Alternative Parquet backend

  # Protein similarity modules dependencies
  - biopython  # FASTA parsing (ESM-2, DIAMOND)
  - h5py  # HDF5 file handling (ESM-2 embeddings)
  - diamond=2.1.14  # Protein sequence alignment (IMPORTANT: v2.1.14 to avoid ZSTD bug)

  # API dependencies (modules/api/)
  - fastapi
  - uvicorn
  - pydantic  # Let conda resolve compatible version
  - pydantic-settings
  - pyyaml
  - ruamel.yaml  # YAML with comment preservation (for snapshot feature)

  - pip
  - pip:
    - snakemake-executor-plugin-cluster-generic
    - python-multipart>=0.0.6  # FastAPI file uploads (API)

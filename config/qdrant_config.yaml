# Qdrant Server Configuration
# Used by Singularity container when starting Qdrant server
# Optimized for HPC cluster environment with NFS storage

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  enable_cors: true

storage:
  # Storage path inside container (bind-mounted from host)
  storage_path: /qdrant/storage

  # WAL settings optimized for NFS environment
  # Increased from 128MB to 256MB for better NFS tolerance
  wal_capacity_mb: 256
  wal_segments_ahead: 2

  # Performance tuning for NFS
  performance:
    max_search_threads: 0  # Use all available cores
    max_optimization_threads: 2  # Increased for better performance

# Global optimizer configuration
# Optimized for WAL stability on NFS storage
optimizer:
  deleted_threshold: 0.2
  vacuum_min_vector_number: 1000
  default_segment_number: 0
  max_segment_size: 2147483648  # 2GB segments (in bytes) - reduced from 5GB for better WAL stability
  memmap_threshold: 524288000   # 500MB threshold (in bytes) - reduced from 1GB
  indexing_threshold: 1073741824  # 1GB threshold (in bytes) - reduced from 2GB
  flush_interval_sec: 30        # Flush WAL every 30 seconds

# Cluster settings (for future scaling)
cluster:
  enabled: false

# Collection settings
collection:
  default_config:
    params:
      vectors:
        size: 768  # S-BioBERT dimensions
        distance: Cosine

      # Optimize for similarity search
      hnsw_config:
        m: 16
        ef_construct: 100
        full_scan_threshold: 10000

# Logging
log_level: INFO

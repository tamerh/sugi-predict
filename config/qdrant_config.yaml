# Qdrant Server Configuration
# Used by Singularity container when starting Qdrant server
# Optimized for HPC cluster environment with NFS storage

service:
  host: 127.0.0.1  # Localhost only - no remote access
  http_port: 6333
  grpc_port: 6334
  enable_cors: true

  # Increase timeout for large collection searches (27M+ docs)
  # Default is 60s which causes timeouts on pubmed_abstracts
  max_request_timeout_sec: 300  # 5 minutes for search operations

storage:
  # Storage path inside container (bind-mounted from host)
  storage_path: /qdrant/storage

  # WAL settings optimized for NFS environment
  # Increased from 128MB to 256MB for better NFS tolerance
  wal_capacity_mb: 256
  wal_segments_ahead: 2

  # Performance tuning for HPC cluster
  performance:
    max_search_threads: 0  # Use all cores for search (queries should be fast!)
    max_optimization_threads: 8  # Limit optimization/indexing threads to prevent overload

# Cluster settings (for future scaling)
cluster:
  enabled: false

# Logging
log_level: INFO

# NOTE: Collection-specific settings are configured per-collection in config.yaml:
#   - HNSW parameters (m, ef_construct, max_indexing_threads)
#     * Recommended: max_indexing_threads: 8 (limits CPU during HNSW index building)
#   - Segment optimization (indexing_threshold, max_segment_size)
#     * Recommended: max_optimization_threads via API after collection creation
#   - Insertion settings (batch_size, prefer_grpc)
# This allows different configurations for different collections (e.g., pubmed vs clinical_trials)
#
# IMPORTANT: The max_indexing_threads (HNSW) and max_optimization_threads settings
# can be adjusted per-collection via API:
#   curl -X PATCH http://host:6333/collections/{name} -H "Content-Type: application/json" -d '{
#     "hnsw_config": {"max_indexing_threads": 8},
#     "optimizers_config": {"max_optimization_threads": 8}
#   }'

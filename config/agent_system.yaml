# BioYoda Multi-Agent System Configuration

# Gateway settings
gateway:
  max_query_length: 1000
  session_timeout_hours: 24
  rate_limit:
    requests_per_minute: 60
    requests_per_hour: 1000

# Integration settings
integrations:
  biobtree:
    protocol: "rest"  # "grpc" (default) or "rest"
    grpc:
      host: "localhost"  # BioBTree running locally
      port: 7777
      max_connections: 50
      keepalive_time: 30  # seconds
      timeout: 30  # seconds
    rest:
      host: "localhost"  # BioBTree REST on localhost:9292
      port: 9292
      timeout: 30
    retry_attempts: 3
    retry_delay: 1  # seconds

  qdrant:
    host: "localhost"  # Qdrant running locally
    port: 6333
    timeout: 30
    collections:
      pubmed: "pubmed_abstracts"
      clinical_trials: "clinical_trials"
      patents_text: "patents_text"
      patents_compounds: "patents_compounds"
      esm2: "esm2"

  redis:
    host: "localhost"
    port: 6379
    db: 0
    cache_ttl_hours: 24
    enabled: true

# LLM provider settings
# NOTE: These settings can be overridden by the main BioYoda config (config/config.yaml -> rag section)
# Agent system will check: 1) This file, 2) Main config rag section, 3) Environment variables
llm:
  # Default provider: anthropic | openai | gemini | openrouter
  # If not set here, will use config.yaml -> rag.provider
  default_provider: openrouter  # OpenRouter provides unified access to multiple models

  # Provider configurations
  # If null/missing, will fallback to config.yaml -> rag section
  providers:
    # OpenRouter - Unified API for 100+ models
    # Available models via OpenRouter:

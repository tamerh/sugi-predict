name: bioyoda
channels:
  - pytorch
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12
  - faiss-cpu
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly
  - sentence-transformers
  - requests
  - tqdm
  - pandas
  - lxml
  - psutil
  - qdrant-client
  - psycopg2-binary
  - beautifulsoup4
  - postgresql
  - snakemake>=9.0
  - graphviz  # For DAG visualization

  # Patents module dependencies
  - rdkit  # Chemical structure processing
  - pyarrow  # Parquet file reading
  - fastparquet  # Alternative Parquet backend

  # Protein similarity modules dependencies
  - biopython  # FASTA parsing (ESM-2, DIAMOND)
  - h5py  # HDF5 file handling (ESM-2 embeddings)
  - diamond=2.1.14  # Protein sequence alignment (IMPORTANT: v2.1.14 to avoid ZSTD bug)

  # API dependencies (modules/api/)
  - fastapi
  - uvicorn
  - pydantic  # Let conda resolve compatible version
  - pydantic-settings
  - pyyaml
  - ruamel.yaml  # YAML with comment preservation (for snapshot feature)

  # Agent system dependencies
  - grpcio  # gRPC for BioBTree integration
  - protobuf  # Protocol Buffers
  - httpx  # Async HTTP client
  - jinja2  # Template engine for prompts
  - redis-py  # Redis caching
  - structlog  # Structured logging
  - python-dotenv  # Environment variables

  - pip
  - pip:
    - snakemake-executor-plugin-cluster-generic  # For SGE/cluster execution
    - python-multipart>=0.0.6  # FastAPI file uploads (API)
    # RAG dependencies (modules/api/ - RAG Q&A)
    - anthropic>=0.25.0  # Claude API for answer generation
    - openai>=1.12.0     # OpenAI GPT-4 API (alternative)
    - google-generativeai>=0.3.0  # Google Gemini API (alternative)
    - tiktoken>=0.5.0    # Token counting for cost estimation
    # Protein similarity modules
    - fair-esm  # Meta AI's ESM-2 protein language model
    # Agent system (gRPC tools not available via conda)
    - grpcio-tools>=1.60.0  # gRPC Python code generation
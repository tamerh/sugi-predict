name: bioyoda
channels:
  - pytorch
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12
  - faiss-cpu
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly
  - sentence-transformers
  - requests
  - tqdm
  - pandas
  - lxml
  - psutil
  - qdrant-client
  - psycopg2-binary
  - beautifulsoup4
  - postgresql
  - snakemake>=9.0
  - graphviz  # For DAG visualization
  - pip
  - pip:
    - snakemake-executor-plugin-cluster-generic  # For SGE/cluster execution
# Local Qdrant for the BioYoda build pipeline (serves collections built from FAISS sources).
# Standalone compose project ("bioyoda"), independent of any production deployment.
# Launch:  docker compose -p bioyoda -f config/docker-compose.bioyoda.yml up -d
# Host-specific values (storage path, memory cap) come from an optional config/qdrant.env.
services:
  qdrant:
    image: qdrant/qdrant:v1.18.2          # pin to the version that wrote the on-disk data
    container_name: qdrant-bioyoda
    restart: unless-stopped
    # Cap container memory so an HNSW build spike can't thrash the host; tune via QDRANT_MEM_LIMIT.
    mem_limit: ${QDRANT_MEM_LIMIT:-8g}
    memswap_limit: ${QDRANT_MEM_LIMIT:-8g}   # == mem_limit -> container swap disabled
    mem_swappiness: 0
    environment:
      # Bind 0.0.0.0 inside the container; host exposure is limited by the 127.0.0.1 port map below.
      - QDRANT__SERVICE__HOST=0.0.0.0
    ports:
      - "127.0.0.1:6333:6333"             # HTTP, localhost only
      - "127.0.0.1:6334:6334"             # gRPC, localhost only
    volumes:
      - ${QDRANT_STORAGE:-./qdrant-storage}:/qdrant/storage
      - ./qdrant_config.yaml:/qdrant/config/production.yaml:ro
    stop_grace_period: 120s               # let Qdrant flush its WAL cleanly on stop

##############################################################################
#
#   BioYoda Test Overrides
#   Only test-specific changes - merges with config.yaml at runtime
#
##############################################################################

# Override base directory for test mode (relative to project root)
base_dir: "test_out"

# PubMed test overrides
pubmed:
  # Test mode settings
  test_mode: true
  test_abstracts_limit: 100
  debug_mode: true
  debug_sample_size: 2
  test_fixture_file: "test_out/raw_data/pubmed/baseline/test_abstracts.xml.gz"

  # Reduced resources for testing
  process_memory_mb: 8192      # 8GB (vs 12GB production)
  merge_memory_mb: 8192        # 8GB (vs 256GB production)

  # Qdrant insertion overrides
  qdrant:
    memory_mb: 4096            # 4GB (vs 8GB production)

# Clinical Trials test overrides
clinical_trials:
  # Test mode settings
  test_mode: true
  test_trials_limit: 400             # Process only first 400 trials (fallback)
  #test_nct_ids_file: "tests/fixtures/clinical_trials/test_nct_ids.txt"  # Filter by specific NCT IDs

  # Override the production source_json with a small enriched fixture so the CT
  # step runs fully offline in tests (no AACT download, no 2.2GB biobtree file).
  source_json: "tests/fixtures/clinical_trials/trials.json"

  # Smaller chunks for testing
  trials_per_chunk: 50         # Very small (vs 20000 production)
  encode_batch_size: 32        # Optimized for CPU
  num_workers: 1

  # Reduced resources for testing
  download_memory_mb: 8192     # 8GB (vs 16GB production)
  extract_memory_mb: 8192      # 8GB (vs 16GB production)
  process_memory_mb: 8192      # 8GB (vs 12GB production)
  merge_memory_mb: 8192        # 8GB (vs 32GB production)

  # Update settings overrides
  update:
    update_chunk_size: 50      # Small (vs 20000 production)

  # Qdrant insertion overrides
  qdrant:
    memory_mb: 4096            # 4GB (vs 8GB production)

# Patents test overrides
patents:
  # Test mode settings
  test_mode: true
  test_limit_compounds: 1000         # Process only first 1000 compounds (used by Snakefile)
  test_limit_patents: 500            # Process only first 500 patents (fallback when not using ID file)
  test_patent_ids_file: "tests/fixtures/patents/test_patent_ids_with_uspto.txt"  # Filter by specific patent IDs (for testing enrichment)
  test_limit_files: 4                # Limit number of files to download in test mode
  max_mapping_rows: 10000000         # Scan only first 10M rows of mapping file (vs all 1.5B in production)

  # Chunking strategy for testing
  patents_per_chunk: 100       # 100 patents per chunk for testing (vs 1M production)

  compounds_per_chunk: 100      # 100 compounds per chunk for testing (vs 1M production in production)

  # USPTO test settings
  # Disabled for local testing - USPTO historical data not available locally
  # To enable, copy historical USPTO data to test_out/raw_data/patents/historical_uspto/
  enable_uspto: false
  uspto_historical_json_dir: "raw_data/patents/historical_uspto"

  # Smaller batches for testing
  batch_size: 100              # Patents per batch (vs 10000 production)
  encode_batch_size: 32        # Batch size for encoding (vs 128 production)
  processing_batch_size: 1000  # Compounds per processing batch (vs 100000 production)
  num_workers: 1

  # Reduced resources for testing
  download_memory_mb: 8192     # 8GB (vs 16GB production)
  process_memory_mb: 12288     # 12GB for USPTO enrichment (vs 20GB production)

  # Qdrant insertion overrides
  qdrant:
    memory_mb: 4096            # 4GB (vs 8GB production)

# Protein Similarity ESM-2 test overrides
esm2:
  # Test mode settings
  test_mode: true
  test_limit_proteins: 60    # Download first 60 proteins from SwissProt
  test_num_chunks: 3          # Split into 3 chunks (20 proteins each) in test mode

  # Use smaller batch size for testing
  batch_size: 8                # Small batch (vs 16 production)

  # Reduced resources for testing
  download_memory_mb: 4096     # 4GB (vs 8GB production)
  process_memory_mb: 16384     # 16GB (vs 32GB production)
  merge_memory_mb: 32768       # 32GB (vs 65GB production)

  # Qdrant insertion overrides
  qdrant:
    memory_mb: 4096            # 4GB (vs 8GB production)

# Protein Similarity DIAMOND test overrides
diamond:
  # Test mode settings
  test_mode: true
  dataset: "test"              # Use test dataset
  num_chunks: 3                # Split into 3 chunks (20 proteins each)
  proteins_per_chunk: 20       # 20 proteins per chunk (60 total)

  # DIAMOND parameters (fast mode for testing)
  diamond:
    max_target_seqs: 100       # Keep top-100 targets (vs 1000 production)
    evalue: 0.001
    sensitivity: "fast"        # Fast mode (vs sensitive in production)
    threads: 4
    outfmt: 6

  # Filtering
  filter:
    top_k: 10                  # Keep top-10 for testing (vs 100 production)
    min_identity: 0.0
    min_coverage: 0.0

  # Reduced resources for testing
  download_memory_mb: 2048     # 2GB (vs 8GB production)
  split_memory_mb: 1024        # 1GB (vs 4GB production)
  create_db_memory_mb: 2048    # 2GB (vs 8GB production)
  search_memory_mb: 4096       # 4GB (vs 32GB production)
  merge_memory_mb: 2048        # 2GB (vs 28GB production)
  filter_memory_mb: 2048       # 2GB (vs 64GB production)

  # BioBTree output
  biobtree:
    enabled: true
    output_format: "json"

# Qdrant test overrides
qdrant:
  # CRITICAL: isolate test storage from the shared/prod snapshots/qdrant_latest.
  # Without this override, `./bioyoda.sh test` starts Qdrant on production storage
  # and inserts test fixtures into the real collections (overwriting low point IDs).
  storage:
    path: "test_out/data/qdrant"   # isolated test storage (was inheriting snapshots/qdrant_latest)
    local_scratch_base: ""     # Empty = use NFS at test_out/data/qdrant (vs local scratch in production)

  batch_size: 100              # Small batches (vs 500 production)
  server:
    memory_mb: 16384           # 16GB (vs 128GB production)

# Cluster test overrides
cluster:
  max_jobs: 10                 # Reduced for testing (vs 100 production)
  default_memory_mb: 8192      # 8GB for testing

# API test overrides
api:
  title: "BioYoda Search API (Test Mode)"

# Qdrant API connection override
qdrant_api:
  connection_info_path: "test_out/data/qdrant/connection_info.txt"

# Collection metadata overrides for test
collections:
  pubmed_abstracts:
    description: "PubMed abstracts - Test dataset (100 abstracts)"
    display_name: "PubMed (Test)"

  clinical_trials:
    description: "ClinicalTrials.gov - Test dataset (400 trials)"
    display_name: "Clinical Trials (Test)"

# Logging override
logging:
  file: "test_out/logs/api/api.log"

# RAG test overrides
rag:
  default_top_k: 3             # Fewer results (vs 5 production)
  max_top_k: 10                # Lower max (vs 20 production)
  default_max_tokens: 500      # Shorter answers (vs 1000 production)
  max_context_length: 50000    # Smaller context (vs 100000 production)
  search_timeout: 10           # Shorter timeout (vs 30 production)
  llm_timeout: 60              # Shorter timeout (vs 120 production)

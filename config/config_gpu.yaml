##############################################################################
#
#   BioYoda GPU Configuration File
#   Optimized configuration for GPU-accelerated processing
#
##############################################################################

# Project Settings
project_name: "bioyoda"
conda_env: "bioyoda_gpu"

# Base Paths
base_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev"
data_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data"
scripts_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/modules"
logs_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/logs"

# PubMed Module Configuration
pubmed:
  # Data directories
  raw_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/raw/pubmed"
  processed_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/processed/pubmed"
  final_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/pubmed"
  log_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/logs/pubmed"

  # Files
  file_list: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/pubmed/pubmed_files.txt"
  final_index: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/pubmed/master_pubmed.index"
  final_metadata: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/pubmed/master_pubmed.json"

  # Model settings
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings - GPU optimized
  batch_size: 1000
  encode_batch_size: 256        # Larger batch size for GPU (128-512 optimal)
  num_workers: 4                # Moderate workers for GPU

  # Job resources - GPU optimized
  process_memory_mb: 16384      # 16GB for GPU processing
  process_runtime: 10080        # 168 hours in minutes
  merge_memory_mb: 262144       # 256GB
  merge_runtime: 10080          # 168 hours in minutes

  # Qdrant insertion settings
  qdrant:
    collection_name: "pubmed_abstracts"
    memory_mb: 16384            # More memory for GPU nodes
    runtime_hours: 8

  # Debug settings
  debug_mode: false
  debug_sample_size: 2

# Clinical Trials Module Configuration
clinical_trials:
  # Data directories
  raw_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/raw/clinical_trials"
  processed_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/processed/clinical_trials"
  final_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/clinical_trials"
  log_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/logs/clinical_trials"

  # Output files
  trials_json: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/processed/clinical_trials/trials_data.json"
  final_index: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/clinical_trials/clinical_trials.index"
  final_metadata: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final/clinical_trials/clinical_trials.json"

  # Model settings (same as PubMed for consistency)
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings - GPU optimized
  batch_size: 1000
  encode_batch_size: 256        # Larger batch size for GPU (128-512 optimal)
  num_workers: 1                # GPU handles parallelism internally
  max_chunk_length: 500
  min_text_length: 50
  min_summary_length: 100

  # Chunking strategy for parallel processing (NEW)
  enable_chunking: true         # Enable chunking for multi-GPU parallelism
  trials_per_chunk: 100000      # Larger chunks for GPU (50K-100K+ for GPU batch efficiency)

  # Text extraction flags
  include_detailed_description: true
  include_outcomes: true
  include_eligibility: true
  include_interventions: true
  exclude_withdrawn: true

  # Job resources - GPU optimized
  download_memory_mb: 16384     # 16GB for download + extraction
  download_runtime: 240         # 4 hours
  extract_memory_mb: 16384      # 16GB for table joins
  extract_runtime: 240          # 4 hours
  process_memory_mb: 16384      # 16GB per GPU chunk
  process_runtime: 480          # 8 hours per chunk (GPU is much faster)
  merge_memory_mb: 32768        # 32GB for merging all chunks
  merge_runtime: 240            # 4 hours for merge

  # Qdrant insertion settings
  qdrant:
    collection_name: "clinical_trials"
    memory_mb: 16384            # More memory for GPU nodes
    runtime_hours: 4

# Qdrant Module Configuration
qdrant:
  # Storage
  storage_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/qdrant"
  log_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/logs/qdrant"

  # Insertion settings
  batch_size: 1000              # Larger batches for GPU processing

  # Server settings (for auto-start via Snakemake)
  server:
    memory_mb: 131072           # 128GB for server
    runtime_hours: 48           # 2 days

# Output directory for final FAISS exports
final_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev/data/final"

# HPC Cluster Configuration
cluster:
  type: "sge"
  default_queue: "gpu"          # Use GPU queue by default
  max_jobs: 50                  # Fewer parallel jobs for GPU (limited GPU slots)

  # Resource defaults
  default_memory_mb: 16384      # More memory for GPU nodes
  default_threads: 1

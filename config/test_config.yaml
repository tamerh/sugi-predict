##############################################################################
#
#   BioYoda Test Configuration File
#   Optimized settings for fast end-to-end pipeline testing
#
##############################################################################

# Project Settings
project_name: "bioyoda"
conda_env: "bioyoda"

# Base Paths
base_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda"
data_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data"
scripts_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/modules"
logs_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/logs"

# PubMed Module Configuration - TEST MODE
pubmed:
  # Data directories (same as production - test will overwrite)
  raw_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/raw/pubmed"
  processed_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/processed/pubmed"
  final_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/pubmed"
  log_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/logs/pubmed"

  # Files
  file_list: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/pubmed/pubmed_files.txt"
  final_index: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/pubmed/master_pubmed.index"
  final_metadata: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/pubmed/master_pubmed.json"

  # Model settings (same as production)
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings
  batch_size: 1000

  # TEST MODE SETTINGS
  test_mode: true              # Enable test optimizations
  test_abstracts_limit: 1000   # Process only first 1000 abstracts per file
  debug_mode: true             # Download only limited files
  debug_sample_size: 2         # Number of files to download

  # Job resources - OPTIMIZED FOR TEST
  process_memory_mb: 8192      # 8GB (need more for model loading)
  merge_memory_mb: 8192        # 8GB (vs 256GB production) - enough for 2×1000 abstracts

  # Qdrant insertion settings - TEST MODE
  qdrant:
    collection_name: "pubmed_abstracts"
    memory_mb: 4096            # 4GB (vs 8GB production)
    runtime_hours: 1           # 1 hour (vs 8 hours production)

# Clinical Trials Module Configuration - TEST MODE
clinical_trials:
  # Data directories (same as production)
  raw_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/raw/clinical_trials"
  processed_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/processed/clinical_trials"
  final_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/clinical_trials"
  log_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/logs/clinical_trials"

  # Output files
  trials_json: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/processed/clinical_trials/trials_data.json"
  final_index: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/clinical_trials/clinical_trials.index"
  final_metadata: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final/clinical_trials/clinical_trials.json"

  # Model settings (same as PubMed)
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings
  batch_size: 1000
  max_chunk_length: 500
  min_text_length: 50
  min_summary_length: 100

  # Text extraction flags
  include_detailed_description: true
  include_outcomes: true
  include_eligibility: true
  include_interventions: true
  exclude_withdrawn: true

  # TEST MODE SETTINGS
  test_mode: true              # Enable test optimizations
  test_trials_limit: 100       # Process only first 100 trials

  # Job resources - OPTIMIZED FOR TEST
  download_memory_mb: 8192     # 8GB (vs 16GB production)
  extract_memory_mb: 8192      # 8GB (vs 16GB production)
  process_memory_mb: 8192      # 8GB (vs 20GB production)

  # Qdrant insertion settings - TEST MODE
  qdrant:
    collection_name: "clinical_trials"
    memory_mb: 4096            # 4GB (vs 8GB production)
    runtime_hours: 1           # 1 hour (vs 4 hours production)

# Qdrant Module Configuration - TEST MODE
qdrant:
  # Storage
  storage_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/qdrant"
  log_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/logs/qdrant"

  # Insertion settings
  batch_size: 100              # Small batches for testing (vs 1000 production)

  # Server settings - OPTIMIZED FOR TEST
  server:
    memory_mb: 16384           # 16GB (vs 128GB production) - enough for test data
    runtime_hours: 4           # 4 hours (vs 48 hours production)

# Output directory for final FAISS exports
final_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda/data/final"

# HPC Cluster Configuration
cluster:
  type: "sge"
  default_queue: "scc"
  max_jobs: 10  # Reduced for testing

  # Resource defaults
  default_memory_mb: 8192       # 8GB for testing
  default_threads: 1

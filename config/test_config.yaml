##############################################################################
#
#   BioYoda Test Configuration File
#   Optimized settings for fast end-to-end pipeline testing
#
##############################################################################

# Project Settings
project_name: "bioyoda"
conda_env: "bioyoda"

# Base Paths - CHANGE THIS FOR DIFFERENT ENVIRONMENTS
# Test outputs go to test_out/ directory for easy cleanup
base_dir: "/data/scc/ag-gruber/GROUP/tgur/x/bioyoda_dev2/test_out"

# PubMed Module Configuration - TEST MODE
pubmed:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # Model settings (same as production)
  model_name: "pritamdeka/S-BioBERT-snli-multinli-stsb"
  vector_dimension: 768

  # Processing settings
  batch_size: 1000

  # TEST MODE SETTINGS
  test_mode: true                    # Enable test optimizations
  test_abstracts_limit: 100          # Process only first 100 abstracts per file
  debug_mode: true                   # Download only limited files
  debug_sample_size: 2               # Number of files to download (fallback if no fixture)
  test_fixture_file: "test_out/raw_data/pubmed/baseline/test_abstracts.xml.gz"  # Use pre-extracted fixture

  # Job resources - OPTIMIZED FOR TEST
  process_memory_mb: 8192      # 8GB (need more for model loading)
  merge_memory_mb: 8192        # 8GB (vs 256GB production) - enough for 2×1000 abstracts

  # Qdrant insertion settings - TEST MODE
  qdrant:
    collection_name: "pubmed_abstracts"
    memory_mb: 4096            # 4GB (vs 8GB production)
    runtime_hours: 1           # 1 hour (vs 8 hours production)

# Clinical Trials Module Configuration - TEST MODE
clinical_trials:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # Model settings (same as PubMed)
  model_name: "NeuML/pubmedbert-base-embeddings"
  vector_dimension: 768

  # Processing settings
  batch_size: 1000
  encode_batch_size: 32        # Batch size for model encoding (optimized for CPU)
  num_workers: 1               # Single worker for test mode
  max_chunk_length: 500
  min_text_length: 50
  min_summary_length: 100

  # Chunking strategy for parallel processing (TEST MODE)
  enable_chunking: true        # Test chunking with small dataset
  trials_per_chunk: 50         # Very small chunks for testing (production: 20000)

  # Text extraction flags
  include_detailed_description: true
  include_outcomes: true
  include_eligibility: true
  include_interventions: true
  exclude_withdrawn: true

  # TEST MODE SETTINGS
  test_mode: true                    # Enable test optimizations
  test_trials_limit: 100             # Process only first 100 trials (fallback)
  test_nct_ids_file: "tests2/fixtures/clinical_trials/test_nct_ids.txt"  # Filter by specific NCT IDs

  # Job resources - OPTIMIZED FOR TEST
  download_memory_mb: 8192     # 8GB (vs 16GB production)
  extract_memory_mb: 8192      # 8GB (vs 16GB production)
  process_memory_mb: 8192      # 8GB per chunk (vs 12GB production)
  merge_memory_mb: 8192        # 8GB for merge (vs 32GB production)

  # Qdrant insertion settings - TEST MODE
  qdrant:
    collection_name: "clinical_trials"
    memory_mb: 4096            # 4GB (vs 8GB production)
    runtime_hours: 1           # 1 hour (vs 4 hours production)

# Qdrant Module Configuration - TEST MODE
qdrant:
  # NOTE: Directories are constructed from base_dir in Snakefile

  # Insertion settings
  batch_size: 100              # Small batches for testing (vs 1000 production)

  # Server settings - OPTIMIZED FOR TEST
  server:
    memory_mb: 16384           # 16GB (vs 128GB production) - enough for test data
    runtime_hours: 4           # 4 hours (vs 48 hours production)

# NOTE: final_dir is constructed from base_dir in Snakefile

# HPC Cluster Configuration
cluster:
  type: "sge"
  default_queue: "scc"
  max_jobs: 10  # Reduced for testing

  # Resource defaults
  default_memory_mb: 8192       # 8GB for testing
  default_threads: 1

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  title: "BioYoda Search API (Test Mode)"
  version: "0.1.0"
  description: "Semantic search API for biomedical literature and clinical trials"

# Qdrant Connection (for API)
qdrant_api:
  url: "http://localhost:6333"
  timeout: 30
  connection_info_path: "test_out/data/qdrant/connection_info.txt"  # Auto-detect URL from test output

# Search Settings (for API)
search:
  # NOTE: model_name is read from pubmed.model_name or clinical_trials.model_name
  # to ensure it matches what was used during indexing
  default_limit: 10
  max_limit: 100
  cache_model: true
  batch_size: 32

# Collection Metadata (for API)
collections:
  pubmed_abstracts:
    name: "pubmed_abstracts"
    description: "PubMed abstracts - Test dataset (50 abstracts)"
    primary_fields: ["pmid", "chunk_text"]
    search_fields: ["chunk_text"]
    display_name: "PubMed (Test)"

  clinical_trials:
    name: "clinical_trials"
    description: "ClinicalTrials.gov - Test dataset (50 trials)"
    primary_fields: ["nct_id", "chunk_text", "chunk_type"]
    search_fields: ["chunk_text"]
    display_name: "Clinical Trials (Test)"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "test_out/logs/api/api.log"

# RAG (Retrieval-Augmented Generation) Configuration - TEST MODE
rag:
  # LLM Provider Configuration
  provider: "gemini"  # anthropic | openai | gemini | local
  model: "gemini-2.0-flash-lite"
  api_key: "AIzaSyDwpxZ9xw511Btlrdcr2rInc8Ck2WOgh0A"  # Set via environment variable

  # RAG Parameters - TEST MODE
  default_top_k: 3              # Fewer results for testing
  max_top_k: 10                 # Lower max for testing
  default_temperature: 0.1      # Low temperature for factual answers
  default_max_tokens: 500       # Shorter answers for testing
  max_context_length: 50000     # Smaller context for testing

  # Default collections to search
  default_collections:
    - "pubmed_abstracts"
    - "clinical_trials"

  # Safety and validation
  enable_validation: true       # Enable citation validation
  require_citations: true       # Require citations in responses

  # Document Aggregation Settings (NEW)
  enable_aggregation: true      # Enable chunk deduplication and aggregation
  retrieval_multiplier: 4       # Retrieve 4× more chunks before aggregation
  aggregation_strategy: "max"   # Scoring: "max" | "avg" | "sum"

  # Performance settings
  search_timeout: 10            # Shorter timeout for testing
  llm_timeout: 60               # Shorter timeout for testing

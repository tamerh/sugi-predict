[pytest]
# Pytest configuration for BioYoda

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for complete workflows (validate existing data)
    e2e: End-to-end tests that actually run the pipeline (VERY SLOW)
    slow: Tests that take a long time to run
    gpu: Tests that require GPU availability
    cluster: Tests that require HPC cluster

# Coverage options (if pytest-cov is installed)
# Uncomment when ready for coverage tracking
# addopts = --cov=modules --cov-report=html --cov-report=term

# Minimum Python version
minversion = 3.8

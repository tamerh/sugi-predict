# Qdrant Configuration for HPC Cluster
service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  enable_cors: true

storage:
  # Storage path for the Qdrant data
  storage_path: /qdrant/storage

  # Performance settings for HPC environment
  wal_capacity_mb: 32
  wal_segments_ahead: 0

# Global optimizer configuration
optimizer:
  deleted_threshold: 0.2
  vacuum_min_vector_number: 1000
  default_segment_number: 0
  max_segment_size: 5368709120  # 5GB segments (in bytes)
  memmap_threshold: 1073741824  # 1GB threshold (in bytes)
  indexing_threshold: 2147483648  # 2GB threshold (in bytes)

# Cluster settings (for future scaling)
cluster:
  enabled: false

# Collection settings
collection:
  default_config:
    params:
      vectors:
        size: 768  # S-BioBERT dimensions
        distance: Cosine

      # Optimize for similarity search
      hnsw_config:
        m: 16
        ef_construct: 100
        full_scan_threshold: 10000

# Logging
log_level: INFO
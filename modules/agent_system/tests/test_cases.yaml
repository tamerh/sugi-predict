# BioYoda Agent Test Cases
#
# Each test case has:
#   - name: Short description
#   - query: The user query to test
#   - expect_tool: Tool name if tool should be called, or false for direct answer
#   - expect_agent: (for agent mode) Which agent should handle this
#   - expect_contains: List of strings that should appear in result
#   - expect_mapped: (optional) Minimum number of mapped terms for biobtree queries

# =============================================================================
# Direct Answer Tests - LLM should answer from knowledge
# =============================================================================
direct_answers:
  - name: "Known protein description"
    query: "What is P04637?"
    expect_tool: false
    expect_contains: ["TP53", "p53"]

  - name: "Gene function question"
    query: "What does BRCA1 do?"
    expect_tool: false
    expect_contains: ["DNA", "repair", "cancer"]

  - name: "Simple protein ID known"
    query: "What is the protein ID for TP53?"
    expect_tool: false
    expect_contains: ["P04637"]

# =============================================================================
# BioBTree Query Tests - Should use biobtree_query tool
# =============================================================================
biobtree_queries:
  - name: "Single gene to protein"
    query: "Map EGFR gene to its UniProt protein ID"
    expect_tool: biobtree_query
    expect_agent: id_mapping
    expect_contains: ["P00533"]
    expect_mapped: 1

  - name: "Multiple genes to proteins"
    query: "What are the UniProt IDs for TP53 and BRCA1?"
    expect_tool: biobtree_query
    expect_agent: id_mapping
    expect_contains: ["P04637", "P38398"]
    expect_mapped: 2

  - name: "Reverse mapping protein to gene"
    query: "What Ensembl gene ID corresponds to UniProt P04637?"
    expect_tool: biobtree_query
    expect_agent: id_mapping
    expect_contains: ["ENSG00000141510"]
    expect_mapped: 1

  - name: "Three genes mapping"
    query: "Find proteins for EGFR, TP53, and BRCA1"
    expect_tool: biobtree_query
    expect_agent: id_mapping
    expect_contains: ["P00533", "P04637", "P38398"]
    expect_mapped: 3

# =============================================================================
# Agent Routing Tests - Test routing to correct agent
# =============================================================================
agent_routing:
  - name: "Route to ID mapping - UniProt keyword"
    query: "Convert TP53 to UniProt ID"
    expect_agent: id_mapping
    expect_tool: biobtree_query

  - name: "Route to ID mapping - Ensembl keyword"
    query: "Get the Ensembl ID for BRCA1"
    expect_agent: id_mapping
    expect_tool: biobtree_query

  - name: "Route to direct - general biology"
    query: "Explain the function of tumor suppressor genes"
    expect_agent: null
    expect_tool: false

# =============================================================================
# Edge Cases and Error Handling
# =============================================================================
edge_cases:
  - name: "Unknown gene"
    query: "Map FAKEGENE123 to UniProt"
    expect_tool: biobtree_query
    expect_mapped: 0

  - name: "Mixed known/unknown"
    query: "Find proteins for TP53 and NOTAREALGENE"
    expect_tool: biobtree_query
    expect_contains: ["P04637"]
    expect_mapped: 1

# =============================================================================
# Drug Discovery Tests - Should use drug_discovery agent
# =============================================================================
drug_discovery:
  - name: "Drugs for single gene"
    query: "What drugs target EGFR?"
    expect_tool: biobtree_query
    expect_agent: drug_discovery
    # Results depend on chembl data availability

  - name: "Inhibitors query"
    query: "Find inhibitors for BRAF"
    expect_tool: biobtree_query
    expect_agent: drug_discovery

  - name: "Compounds for multiple genes"
    query: "What compounds target EGFR and KRAS?"
    expect_tool: biobtree_query
    expect_agent: drug_discovery

  - name: "Drug discovery with therapeutic keyword"
    query: "Find therapeutic compounds for TP53"
    expect_tool: biobtree_query
    expect_agent: drug_discovery

# =============================================================================
# Complex Queries (may require data availability)
# =============================================================================
complex_queries:
  - name: "Gene to pathways"
    query: "What Reactome pathways involve TP53?"
    expect_tool: biobtree_query
    # Results depend on data availability

  - name: "Protein to GO terms"
    query: "What GO terms are associated with P04637?"
    expect_tool: biobtree_query
    # Results depend on data availability

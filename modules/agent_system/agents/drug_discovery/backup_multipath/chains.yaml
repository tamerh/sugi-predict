disease_to_drugs:
  description: "Find drugs for disease-associated genes (via MONDO)"
  chain: "{disease_id} >> mondo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "MONDO:0005148 >> mondo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  use_for: "Genetics-guided drug discovery"

disease_to_approved_drugs:
  description: "Find approved drugs for disease-associated genes"
  chain: "{disease_id} >> mondo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
  example: "MONDO:0005148 >> mondo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
  use_for: "Finding existing drugs that could be repurposed"

efo_disease_to_drugs:
  description: "Find drugs for EFO disease term"
  chain: "{efo_id} >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "EFO:0000685 >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  note: "EFO mappings may be incomplete - prefer MONDO IDs when available"
  response_time_ms: 13367

efo_disease_to_pubchem:
  description: "Find PubChem compounds for EFO disease"
  chain: "{efo_id} >> efo >> gwas >> ensembl >> uniprot >> pubchem_activity >> pubchem"
  example: "EFO:0000685 >> efo >> gwas >> ensembl >> uniprot >> pubchem_activity >> pubchem"
  use_for: "Finding screening hits for disease targets"
  note: "EFO mappings may be incomplete - prefer MONDO IDs when available"


# BioBTree chain templates for Drug Discovery Agent
# Filter syntax: dataset[attribute==value] or dataset[attribute>value]

# =============================================================================
# BASIC CHAINS (No Filtering)
# =============================================================================

gene_to_drugs:
  description: "Find all drugs/compounds targeting a gene"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"

gene_to_targets:
  description: "Check if gene is a drug target (faster, no molecules)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target"
  example: "BRAF >> ensembl >> uniprot >> chembl_target_component >> chembl_target"

protein_to_drugs:
  description: "Find drugs for a UniProt protein"
  chain: "{protein} >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "P00533 >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"

multiple_genes:
  description: "Find drugs for multiple genes at once"
  chain: "{gene1},{gene2},{gene3} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "EGFR,KRAS,BRAF >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"

drug_to_targets:
  description: "Find what targets a drug hits (reverse lookup)"
  chain: "{chembl_id} >> chembl_molecule >> chembl_activity >> chembl_assay >> chembl_target >> chembl_target_component >> uniprot"
  example: "CHEMBL941 >> chembl_molecule >> chembl_activity >> chembl_assay >> chembl_target >> chembl_target_component >> uniprot"

# =============================================================================
# FILTERED CHAINS - Clinical Development Phase
# =============================================================================
# highestDevelopmentPhase: 0=preclinical, 1=Phase I, 2=Phase II, 3=Phase III, 4=Approved

gene_to_approved_drugs:
  description: "Find only approved drugs (Phase 4) targeting a gene"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==4]"
  example: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==4]"

gene_to_clinical_drugs:
  description: "Find drugs in clinical trials (Phase 1-4)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>0]"
  example: "BRAF >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>0]"

gene_to_advanced_clinical:
  description: "Find advanced clinical candidates (Phase 3+)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>2]"
  example: "JAK2 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>2]"

# =============================================================================
# FILTERED CHAINS - Activity/Potency
# =============================================================================
# activity.value: IC50/Ki/EC50 values (note: lower = more potent)
# activity.pChembl: -log10 of activity (higher = more potent, typically 5-10)
# NOTE: pChembl is double, use 7.0 not 7 for comparison

gene_to_potent_compounds:
  description: "Find highly potent compounds (pChEMBL > 7, ~100nM)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>7.0] >> chembl_molecule"
  example: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>7.0] >> chembl_molecule"

gene_to_ic50_activities:
  description: "Find IC50 measurements only (BAO_0000190)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.bao==\"BAO_0000190\"] >> chembl_molecule"
  example: "BRAF >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.bao==\"BAO_0000190\"] >> chembl_molecule"

# =============================================================================
# FILTERED CHAINS - Target Type
# =============================================================================
# target.type: SINGLE PROTEIN, PROTEIN COMPLEX, PROTEIN FAMILY, ORGANISM, CELL LINE

gene_to_single_protein_target:
  description: "Find compounds targeting single protein (not complex/family)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target[chembl.target.type==\"SINGLE PROTEIN\"] >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target[chembl.target.type==\"SINGLE PROTEIN\"] >> chembl_assay >> chembl_activity >> chembl_molecule"

# =============================================================================
# COMBINED FILTERS
# =============================================================================

gene_to_approved_potent:
  description: "Approved drugs with high potency"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>6.0] >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==4]"
  example: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>6.0] >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==4]"

# =============================================================================
# LOGICAL OPERATORS
# =============================================================================
# Supported: && (AND), || (OR), ! (NOT)
# NOT supported: 'and', 'or', 'not' keywords
# WARNING: Logical operators are slower (~17-25s vs ~3-5ms for simple filters)

gene_to_clinical_not_preclinical:
  description: "Drugs in clinical trials (exclude preclinical phase==0)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[!(chembl.molecule.highestDevelopmentPhase==0)]"
  example: "JAK2 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[!(chembl.molecule.highestDevelopmentPhase==0)]"

gene_to_phase3_or_approved:
  description: "Phase 3 OR approved drugs (phase==3 || phase==4)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==3 || chembl.molecule.highestDevelopmentPhase==4]"
  example: "JAK2 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==3 || chembl.molecule.highestDevelopmentPhase==4]"

gene_to_clinical_range:
  description: "Clinical phase 1-3 (exclude preclinical and approved)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>0 && chembl.molecule.highestDevelopmentPhase<4]"
  example: "JAK2 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>0 && chembl.molecule.highestDevelopmentPhase<4]"

# =============================================================================
# PUBCHEM SCREENING DATA
# =============================================================================
# PubChem has 400M+ bioactivity measurements - great for HTS screening data

gene_to_pubchem_activities:
  description: "Find PubChem screening activities for a gene (HTS data)"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity"
  example: "PTGS2 >> ensembl >> uniprot >> pubchem_activity"

gene_to_pubchem_compounds:
  description: "Find PubChem compounds tested against a gene"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem"
  example: "EGFR >> ensembl >> uniprot >> pubchem_activity >> pubchem"

protein_to_pubchem_activities:
  description: "Find PubChem activities for a UniProt protein"
  chain: "{protein} >> uniprot >> pubchem_activity"
  example: "P35354 >> uniprot >> pubchem_activity"

assay_to_activities:
  description: "Get all activity measurements from a PubChem assay (for SAR)"
  chain: "{aid} >> pubchem_assay >> pubchem_activity"
  example: "1347082 >> pubchem_assay >> pubchem_activity"

compound_to_patents:
  description: "Find patents for a PubChem compound (IP landscape)"
  chain: "{cid} >> pubchem >> patent"
  example: "2244 >> pubchem >> patent"

# =============================================================================
# PUBCHEM FILTERED QUERIES
# =============================================================================
# PubChem compound_type values: "drug", "bioactive", "literature", "biologic"
# Performance: ~5s (faster than ChEMBL phase filter at ~20s)

gene_to_pubchem_drugs:
  description: "Find drug-classified PubChem compounds (faster than ChEMBL phase)"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"drug\"]"
  example: "JAK2 >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"drug\"]"
  response_time_ms: 5000
  note: "Faster alternative to ChEMBL phase filter"

gene_to_pubchem_bioactive:
  description: "Find bioactive PubChem compounds"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"bioactive\"]"
  example: "EGFR >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"bioactive\"]"

gene_to_pubchem_biologics:
  description: "Find biologic drugs from PubChem"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"biologic\"]"
  example: "HER2 >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"biologic\"]"

gene_to_patented_compounds:
  description: "Find compounds with patents (IP-protected)"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
  example: "BRAF >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
  response_time_ms: 430

gene_to_published_compounds:
  description: "Find compounds with literature support"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_literature==true]"
  example: "EGFR >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_literature==true]"

# =============================================================================
# MULTI-PATH DISEASE-BASED DRUG DISCOVERY
# =============================================================================
# The multi-path approach queries ALL relevant data sources for comprehensive
# disease → drug discovery results.
#
# 6 PATHS:
#   PATH 1: Direct ChEMBL Indications (disease >> efo >> chembl_molecule)
#   PATH 2: GWAS Genetic Associations (disease >> efo >> gwas >> genes >> drugs)
#   PATH 3: ClinVar Pathogenic Variants (disease >> clinvar >> genes >> drugs)
#   PATH 4: Reactome Disease Pathways (disease >> reactome >> proteins >> drugs)
#   PATH 5: UniProt Disease Annotations (disease >> uniprot >> drugs)
#   PATH 6: Known Targets (direct gene query)
#
# Common Disease IDs:
#   EFO:0000519 - Glioblastoma
#   MONDO:0005148 - Type 2 diabetes
#   MONDO:0005015 - Type 1 diabetes
#   MONDO:0004975 - Alzheimers disease
#   MONDO:0005180 - Parkinsons disease
#   EFO:0000270 - Asthma
#   EFO:0000685 - Rheumatoid arthritis
#   EFO:0001359 - Breast cancer

# -----------------------------------------------------------------------------
# PATH 1: Direct ChEMBL Indications
# -----------------------------------------------------------------------------
# Returns drugs that have the disease listed in their indications
# IMPORTANT: Filter by indication-level phase, not drug-level phase!

disease_direct_indications:
  description: "PATH 1: Find drugs with direct disease indications (most relevant)"
  chain: "{disease_name} >> efo >> chembl_molecule"
  example: "glioblastoma >> efo >> chembl_molecule"
  mode: full
  use_for: "Finding approved/clinical drugs for a disease"
  note: "Check indication[].highestDevelopmentPhase, not molecule.highestDevelopmentPhase"
  response_time_ms: 500

# -----------------------------------------------------------------------------
# PATH 2: GWAS Genetic Associations
# -----------------------------------------------------------------------------
# Finds genes genetically associated with disease, then drugs targeting those genes

disease_gwas_to_drugs:
  description: "PATH 2: Find drugs via GWAS-associated genes (genetics-guided)"
  chain: "{disease_name} >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "glioblastoma >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  mode: full
  use_for: "Finding drugs targeting genetically-associated genes"
  response_time_ms: 15000

disease_gwas_to_genes:
  description: "PATH 2 (intermediate): Find GWAS-associated genes for a disease"
  chain: "{disease_name} >> efo >> gwas >> ensembl"
  example: "glioblastoma >> efo >> gwas >> ensembl"
  use_for: "Identifying genetic targets before drug search"
  response_time_ms: 500

# -----------------------------------------------------------------------------
# PATH 3: ClinVar Pathogenic Variants
# -----------------------------------------------------------------------------
# Finds genes with pathogenic variants for disease, then drugs targeting those genes

disease_clinvar_to_drugs:
  description: "PATH 3: Find drugs via ClinVar pathogenic variant genes"
  chain: "{disease_name} >> clinvar >> hgnc >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "glioblastoma >> clinvar >> hgnc >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  mode: full
  use_for: "Finding drugs targeting genes with disease-causing variants"
  response_time_ms: 15000

disease_clinvar_to_genes:
  description: "PATH 3 (intermediate): Find genes with pathogenic variants"
  chain: "{disease_name} >> clinvar >> hgnc"
  example: "glioblastoma >> clinvar >> hgnc"
  use_for: "Identifying causal genes before drug search"
  response_time_ms: 500

# -----------------------------------------------------------------------------
# PATH 4: Reactome Disease Pathways
# -----------------------------------------------------------------------------
# Finds dysregulated pathways, then drugs targeting pathway proteins

disease_reactome_to_drugs:
  description: "PATH 4: Find drugs via disease-associated pathways"
  chain: "{disease_name} >> efo >> reactome >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "glioblastoma >> efo >> reactome >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  mode: full
  use_for: "Finding drugs targeting dysregulated pathway proteins"
  response_time_ms: 30000

disease_reactome_to_pathways:
  description: "PATH 4 (intermediate): Find disease-associated pathways"
  chain: "{disease_name} >> efo >> reactome"
  example: "glioblastoma >> efo >> reactome"
  use_for: "Identifying dysregulated pathways"
  response_time_ms: 500

# -----------------------------------------------------------------------------
# PATH 5: UniProt Disease Annotations
# -----------------------------------------------------------------------------
# Finds proteins with direct disease annotations

disease_uniprot_to_drugs:
  description: "PATH 5: Find drugs via UniProt disease-annotated proteins"
  chain: "{disease_name} >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "glioblastoma >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  mode: full
  use_for: "Finding drugs targeting proteins with disease annotations"
  response_time_ms: 15000

# -----------------------------------------------------------------------------
# PATH 6: Known Therapeutic Targets (Direct Gene Query)
# -----------------------------------------------------------------------------
# Query known disease targets directly (use when targets are well-established)

known_targets_to_drugs:
  description: "PATH 6: Find drugs for known disease targets"
  chain: "{gene1},{gene2},{gene3} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "EGFR,VEGFA,PDGFRA,IDH1 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  mode: full
  use_for: "Finding drugs for established therapeutic targets"
  response_time_ms: 5000

known_targets_approved:
  description: "PATH 6: Find APPROVED drugs for known disease targets"
  chain: "{gene1},{gene2},{gene3} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
  example: "EGFR,VEGFA,PDGFRA >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
  mode: full
  use_for: "Finding approved drugs only"
  response_time_ms: 10000


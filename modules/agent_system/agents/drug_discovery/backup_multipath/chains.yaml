# =============================================================================
# MULTI-TARGET / POLYPHARMACOLOGY
# =============================================================================
# Find compounds that hit multiple targets

compound_to_all_targets:
  description: "Find all targets a compound hits (polypharmacology)"
  chain: "{chembl_id} >> chembl_molecule >> chembl_activity >> chembl_assay >> chembl_target >> chembl_target_component >> uniprot >> ensembl"
  example: "CHEMBL941 >> chembl_molecule >> chembl_activity >> chembl_assay >> chembl_target >> chembl_target_component >> uniprot >> ensembl"

pubchem_compound_to_targets:
  description: "Find all targets from PubChem compound screening"
  chain: "{cid} >> pubchem >> pubchem_activity >> uniprot >> ensembl"
  example: "2244 >> pubchem >> pubchem_activity >> uniprot >> ensembl"

# =============================================================================
# COMBINED ChEMBL + PubChem STRATEGIES
# =============================================================================
# ChEMBL and PubChem are COMPLEMENTARY data sources:
#
# ChEMBL Strengths:
#   - Curated IC50/Ki values with pChembl scores
#   - Clinical development phases (0-4)
#   - Mechanism of action annotations
#   - Disease indications (EFO/MESH mapped)
#   - Drug names and synonyms
#   - ATC classification
#
# PubChem Strengths:
#   - HTS screening data (400M+ measurements)
#   - Patent associations
#   - Literature links
#   - Compound type classification (drug, bioactive, biologic)
#   - Broader compound coverage
#
# RECOMMENDED STRATEGY:
#   1. Start with ChEMBL for clinical/approved drugs (curated, annotated)
#   2. Use PubChem for screening hits, patents, or when ChEMBL has no results
#   3. Combine both for comprehensive drug discovery

# --- Fast filters (use these first) ---

gene_to_potent_clinical:
  description: "ChEMBL: Find potent compounds in clinical development"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>7.0] >> chembl_molecule"
  example: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>7.0] >> chembl_molecule"
  response_time_ms: 54
  use_for: "Finding lead compounds with good potency"

gene_to_patented:
  description: "PubChem: Find compounds with patent protection"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
  example: "EGFR >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
  response_time_ms: 60
  use_for: "IP landscape, freedom-to-operate analysis"

gene_to_published:
  description: "PubChem: Find compounds with literature support"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_literature==true]"
  example: "EGFR >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_literature==true]"
  response_time_ms: 19
  use_for: "Finding well-studied compounds"

# --- Comprehensive queries (combine both sources) ---

# For approved drugs: ChEMBL phase>3 gives curated drug names + mechanisms
# For all drugs: PubChem compound_type=="drug" is broader but slower

# =============================================================================
# INDICATION/DISEASE-SPECIFIC QUERIES
# =============================================================================
# Find drugs for specific therapeutic areas

gene_to_drugs_with_indications:
  description: "Find drugs with their disease indications (use mode=full)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>2]"
  example: "JAK2 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>2]"
  mode: full
  extract_fields: ["altNames", "indications", "mechanism"]
  use_for: "Getting drug names and what diseases they treat"

# =============================================================================
# SPECIFIC QUERY PATTERNS
# =============================================================================

# Query: "What approved drugs target X?"
# Strategy: ChEMBL phase>3 with mode=full for drug names
approved_drugs_with_names:
  description: "Find approved drugs with their names"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
  mode: full
  extract_fields: ["altNames", "mechanism", "highestDevelopmentPhase"]

# Query: "What compounds are in clinical trials for X?"
# Strategy: ChEMBL phase 1-3
clinical_trial_compounds:
  description: "Find compounds in clinical trials (Phase 1-3)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>0 && chembl.molecule.highestDevelopmentPhase<4]"

# Query: "What are the most potent inhibitors of X?"
# Strategy: ChEMBL pChembl > 8 (10nM potency)
very_potent_compounds:
  description: "Find very potent compounds (sub-10nM, pChembl > 8)"
  chain: "{gene} >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>8.0] >> chembl_molecule"
  use_for: "Finding most potent leads"

# Query: "What screening hits exist for X?"
# Strategy: PubChem (has HTS data)
screening_hits:
  description: "Find HTS screening hits from PubChem"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem"
  use_for: "Early discovery, finding novel scaffolds"

# Query: "What is the patent landscape for X?"
# Strategy: PubChem with patent filter
patent_landscape:
  description: "Find patented compounds (IP analysis)"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
  use_for: "IP landscape, competitive intelligence"

# Query: "What biologic drugs target X?"
# Strategy: PubChem biologic filter
biologic_drugs:
  description: "Find biologic drugs (antibodies, proteins)"
  chain: "{gene} >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"biologic\"]"
  use_for: "Finding antibodies, therapeutic proteins"

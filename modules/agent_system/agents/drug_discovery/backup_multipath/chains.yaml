snp_to_drugs:
  description: "Find drugs for GWAS-associated genes (genetics-guided)"
  chain: "{rsid} >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "rs12345 >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"

clinvar_to_drugs:
  description: "Find drugs for ClinVar variant-associated genes"
  chain: "{clinvar_id} >> clinvar >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
  example: "12345 >> clinvar >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"

# =============================================================================
# ALTERNATIVE GENE ID STARTING POINTS
# =============================================================================
# Support Entrez Gene ID and RefSeq in addition to Ensembl

entrez_to_drugs:
  description: "Find drugs starting from Entrez Gene ID"
  chain: "{entrez_id} >> entrez >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"

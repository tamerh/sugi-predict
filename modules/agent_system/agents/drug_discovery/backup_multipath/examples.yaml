# =============================================================================
# MULTI-PATH DISEASE-BASED QUERIES
# =============================================================================
# The multi-path approach queries ALL relevant data sources for comprehensive
# disease → drug discovery results.

multi_path_disease_queries:
  - q: "What drugs are available for glioblastoma?"
    strategy: "Multi-path: Execute PATH 1, 2, and 3 in sequence"
    queries:
      - path: "PATH 1 - Direct Indications"
        chain: "glioblastoma >> efo >> chembl_molecule"
        mode: "full"
        purpose: "Find drugs with glioblastoma listed in indications"
        expected: "Temozolomide (phase 4), Bevacizumab (phase 4), Carmustine"
        note: "Filter by indication[].highestDevelopmentPhase >= 3"
      - path: "PATH 2 - GWAS Targets"
        chain: "glioblastoma >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
        mode: "full"
        purpose: "Find drugs targeting GWAS-associated genes"
        expected: "Drugs targeting EGFR, TERT, CDKN2A associated genes"
      - path: "PATH 3 - ClinVar Genes"
        chain: "glioblastoma >> clinvar >> hgnc >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
        mode: "full"
        purpose: "Find drugs targeting genes with pathogenic variants"
        expected: "Drugs targeting IDH1, TP53, PTEN, NF1"
    example_response: |
      ## Drugs for Glioblastoma

      ### 1. Approved/Clinical Drugs (Direct Indications)
      | Drug Name | ChEMBL ID | Phase for Glioblastoma | Mechanism |
      |-----------|-----------|------------------------|-----------|
      | Temozolomide | CHEMBL810 | 4 (Approved) | DNA alkylating agent |
      | Bevacizumab | CHEMBL1201583 | 4 (Approved) | VEGF inhibitor |
      | Carmustine | CHEMBL513 | 4 (Approved) | DNA alkylating agent |
      | Lomustine | CHEMBL514 | 4 (Approved) | DNA alkylating agent |

      ### 2. Target-Based Drug Candidates

      #### From GWAS (Genetic Associations)
      | Drug Name | ChEMBL ID | Drug Phase | Target Gene |
      |-----------|-----------|------------|-------------|
      | Erlotinib | CHEMBL553 | 4 | EGFR |
      | Gefitinib | CHEMBL939 | 4 | EGFR |
      | Afatinib | CHEMBL1173655 | 4 | EGFR |

      #### From ClinVar (Pathogenic Variants)
      | Drug Name | ChEMBL ID | Drug Phase | Target Gene |
      |-----------|-----------|------------|-------------|
      | Ivosidenib | CHEMBL3989860 | 4 | IDH1 |

      ### 3. Summary
      - Direct indications: 12 drugs (4 approved for glioblastoma)
      - GWAS targets: 15 genes → 45 drugs
      - ClinVar targets: 8 genes → 22 drugs

  - q: "Find drugs for type 2 diabetes"
    strategy: "Multi-path approach"
    queries:
      - path: "PATH 1"
        chain: "type 2 diabetes >> efo >> chembl_molecule"
        mode: "full"
      - path: "PATH 2"
        chain: "type 2 diabetes >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
        mode: "full"
      - path: "PATH 3"
        chain: "type 2 diabetes >> clinvar >> hgnc >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
        mode: "full"
    expected: "Metformin, GLP-1 agonists, SGLT2 inhibitors, DPP-4 inhibitors"

  - q: "What drugs for breast cancer?"
    strategy: "Multi-path approach"
    queries:
      - path: "PATH 1"
        chain: "breast cancer >> efo >> chembl_molecule"
        mode: "full"
      - path: "PATH 2"
        chain: "breast cancer >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
        mode: "full"
    expected: "Tamoxifen, Trastuzumab, CDK4/6 inhibitors, PARP inhibitors"


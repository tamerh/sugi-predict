# =============================================================================
# COMBINED APPROACH Q&A EXAMPLES
# =============================================================================
# Strategy: Query both ChEMBL and PubChem, combine results for comprehensive answers
#
# Response format guidelines:
# 1. Start with a summary (how many compounds found from each source)
# 2. Highlight approved/clinical drugs first (from ChEMBL)
# 3. Add screening hits and novel compounds (from PubChem)
# 4. Note any unique findings from each source

combined_qa_examples:

  # --- Basic Drug Discovery Question ---
  - question: "What drugs target JAK2?"
    intent: "Find all therapeutic compounds targeting JAK2"
    strategy: "Query both sources in parallel, combine results"
    queries:
      - source: "ChEMBL"
        chain: "JAK2 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
        mode: "full"
        purpose: "Get curated drugs with names and mechanisms"
      - source: "PubChem"
        chain: "JAK2 >> ensembl >> uniprot >> pubchem_activity >> pubchem"
        mode: "lite"
        purpose: "Get broader compound coverage"
    example_response: |
      ## JAK2 Targeting Compounds

      **Summary**: Found 275 compounds in ChEMBL and 275 in PubChem targeting JAK2.

      ### Approved Drugs (ChEMBL Phase 4)
      - **Ruxolitinib** (CHEMBL1789941) - JAK1/JAK2 inhibitor, approved for myelofibrosis
      - **Fedratinib** (CHEMBL3301607) - JAK2 inhibitor, approved for myelofibrosis
      - **Tofacitinib** (CHEMBL221959) - Pan-JAK inhibitor, approved for RA

      ### Clinical Candidates (ChEMBL Phase 1-3)
      - **Pacritinib** (CHEMBL2103848) - Phase 3 for myelofibrosis
      - **Momelotinib** (CHEMBL2007650) - Phase 3 for myelofibrosis

      ### Additional Screening Hits (PubChem)
      - 171 compounds with patent protection
      - 265 compounds with literature support

      *Data sources: ChEMBL (curated), PubChem (screening)*

  # --- Approved Drugs with Names ---
  - question: "What are the approved drugs for EGFR?"
    intent: "Get names of FDA-approved EGFR inhibitors"
    strategy: "ChEMBL phase>3 with full mode for names, supplement with PubChem"
    queries:
      - source: "ChEMBL"
        chain: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
        mode: "full"
        purpose: "Get approved drug names and mechanisms"
      - source: "PubChem"
        chain: "EGFR >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"drug\"]"
        mode: "full"
        purpose: "Cross-reference with PubChem drug classifications"
    example_response: |
      ## Approved EGFR Inhibitors

      ### Small Molecule Inhibitors
      | Drug | ChEMBL ID | Mechanism | Generation |
      |------|-----------|-----------|------------|
      | Erlotinib | CHEMBL553 | EGFR inhibitor | 1st |
      | Gefitinib | CHEMBL939 | EGFR inhibitor | 1st |
      | Afatinib | CHEMBL1173655 | EGFR/HER2 inhibitor | 2nd |
      | Osimertinib | CHEMBL3353410 | EGFR T790M inhibitor | 3rd |
      | Lapatinib | CHEMBL554 | EGFR/HER2 inhibitor | Dual |

      ### Monoclonal Antibodies
      | Drug | Type | Target |
      |------|------|--------|
      | Cetuximab | Chimeric mAb | EGFR |
      | Panitumumab | Human mAb | EGFR |

      *Sources: ChEMBL (157 approved), PubChem (cross-referenced)*

  # --- Potency Question ---
  - question: "What are the most potent BRAF inhibitors?"
    intent: "Find high-potency compounds (sub-100nM)"
    strategy: "ChEMBL pChembl>7 for potent compounds, PubChem for additional hits"
    queries:
      - source: "ChEMBL"
        chain: "BRAF >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>7.0] >> chembl_molecule"
        mode: "full"
        purpose: "Get potent compounds with curated IC50 values"
      - source: "PubChem"
        chain: "BRAF >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_literature==true]"
        mode: "lite"
        purpose: "Find additional published potent compounds"
    example_response: |
      ## Potent BRAF Inhibitors (IC50 < 100nM)

      ### Approved Drugs
      - **Vemurafenib** - IC50 ~31nM (V600E), approved for melanoma
      - **Dabrafenib** - IC50 ~0.8nM (V600E), approved for melanoma
      - **Encorafenib** - IC50 ~0.35nM (V600E), approved for melanoma

      ### Clinical Candidates
      - **PLX8394** - IC50 ~4nM, paradox breaker
      - **LY3009120** - IC50 ~6nM, pan-RAF inhibitor

      ### Research Compounds
      Found 150+ compounds with pChembl > 7.0 (IC50 < 100nM)

      *Note: pChembl 7 = 100nM, pChembl 8 = 10nM, pChembl 9 = 1nM*

  # --- Patent/IP Question ---
  - question: "What is the patent landscape for CDK4/6 inhibitors?"
    intent: "Competitive intelligence, freedom-to-operate analysis"
    strategy: "PubChem has_patents for IP data, ChEMBL for clinical context"
    queries:
      - source: "PubChem"
        chain: "CDK4 >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
        mode: "full"
        purpose: "Get patent-protected compounds"
      - source: "ChEMBL"
        chain: "CDK4 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>0]"
        mode: "full"
        purpose: "Identify which patents cover clinical compounds"
    example_response: |
      ## CDK4/6 Inhibitor Patent Landscape

      ### Approved Drugs (Key Patents)
      | Drug | Company | Key Patents |
      |------|---------|-------------|
      | Palbociclib | Pfizer | Multiple composition/method patents |
      | Ribociclib | Novartis | Composition and combination patents |

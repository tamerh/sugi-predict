# =============================================================================
# SPECIFIC USER QUESTION PATTERNS
# =============================================================================
# How to handle common user questions

specific_question_patterns:
  # Pattern 1: "What approved drugs target X?"
  - q: "What approved drugs target EGFR?"
    strategy: "ChEMBL phase>3 with mode=full for drug names"
    chain: "EGFR >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
    mode: full
    expected: "Erlotinib, Gefitinib, Osimertinib, etc. with mechanisms"

  # Pattern 2: "What are the most potent X inhibitors?"
  - q: "What are the most potent BRAF inhibitors?"
    strategy: "ChEMBL pChembl>8 for sub-10nM compounds"
    chain: "BRAF >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity[chembl.activity.pChembl>8.0] >> chembl_molecule"
    expected: "Very potent compounds (IC50 < 10nM)"

  # Pattern 3: "What is the patent landscape for X?"
  - q: "What is the patent landscape for CDK4?"
    strategy: "PubChem has_patents filter"
    chain: "CDK4 >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.has_patents==true]"
    expected: "Patented compounds for competitive intelligence"

  # Pattern 4: "Find screening hits for X"
  - q: "Find screening hits for KRAS"
    strategy: "PubChem for HTS data"
    chain: "KRAS >> ensembl >> uniprot >> pubchem_activity >> pubchem"
    expected: "All screened compounds including novel scaffolds"

  # Pattern 5: "What biologic drugs target X?"
  - q: "What biologic drugs target HER2?"
    strategy: "PubChem compound_type=biologic"
    chain: "HER2 >> ensembl >> uniprot >> pubchem_activity >> pubchem[pubchem.compound_type==\"biologic\"]"
    expected: "Trastuzumab, Pertuzumab, etc."

  # Pattern 6: "What targets does drug X hit?"
  - q: "What targets does Imatinib hit?"
    strategy: "Reverse lookup from ChEMBL"
    chain: "CHEMBL941 >> chembl_molecule >> chembl_activity >> chembl_assay >> chembl_target >> chembl_target_component >> uniprot >> ensembl"
    expected: "ABL1, KIT, PDGFRA (polypharmacology)"

  # Pattern 7: "Find drugs for disease X"
  - q: "Find drugs for rheumatoid arthritis"
    strategy: "Disease -> GWAS genes -> approved drugs"
    chain: "EFO:0000685 >> efo >> gwas >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule[chembl.molecule.highestDevelopmentPhase>3]"
    mode: full
    expected: "JAK inhibitors, TNF inhibitors with indications"

  # Pattern 8: "Compare ChEMBL and PubChem for X"
  - q: "What compounds target AKT1? (comprehensive)"
    strategy: "Query both ChEMBL and PubChem"
    chains:
      - "AKT1 >> ensembl >> uniprot >> chembl_target_component >> chembl_target >> chembl_assay >> chembl_activity >> chembl_molecule"
      - "AKT1 >> ensembl >> uniprot >> pubchem_activity >> pubchem"
    expected: "Combined results from both sources"


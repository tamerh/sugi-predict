  - q: "Find approved EGFR drugs (phase==4)"
    chain: "EGFR >> ensembl >> ... >> chembl_molecule[chembl.molecule.highestDevelopmentPhase==4]"
    issue: "Query is slow (~20s) due to late filtering"
    workaround: "Use phase>3 instead of phase==4, or use PubChem compound_type=drug filter (~5s)"
    date: "2024-12-09"


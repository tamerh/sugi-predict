name: "ESM-2 PoC — Enju migration"
description: |
  BioYoda esm2 module as an Enju DAG. Demonstrates the heterogeneous-compute
  split: the GPU `generate` step targets a GPU citizen, while the FAISS downstream
  runs on this CPU box.
    prepare  (compute, host) — stage ESM-2 embedding chunks (fixture; prod = generate output)
    generate (compute, GPU citizen) — ESM-2 650M embeddings from FASTA (skipped on CPU)
    faiss    (compute, host, fan-out per h5 chunk) — h5_to_faiss -> FAISS (1280-dim)
    merge    (compute, host, collects) — report
  Outputs to test_out/esm2_poc.
version: 1

publish:
  mode: none

params:
  - name: h5chunks
    type: list<string>
    required: true
    description: "Embedding chunk ids (e.g. 001). Driver-resolved from staged h5 files."

defaults:
  assign_to: tamerh

tasks:
  - id: prepare
    action: compute
    script: workflows/esm2-poc/scripts/prepare.sh
    prompt: "Stage ESM-2 embedding chunks."

  # GPU step. In production set `assign_to: <a registered GPU citizen>` so only
  # a CUDA machine claims it (the multi-machine payoff — results sync via git).
  # Here it runs as a labeled no-op placeholder (generate.sh) since this box has
  # no GPU and the assignee must be a registered citizen.
  - id: generate
    action: compute
    script: workflows/esm2-poc/scripts/generate.sh
    depends_on: [prepare]
    prompt: "Generate ESM-2 650M embeddings from FASTA (production: a GPU citizen)."

  - id: faiss
    action: compute
    script: workflows/esm2-poc/scripts/faiss.sh
    depends_on: [prepare]
    for_each:
      h5chunk: "{{h5chunks}}"
    prompt: "Convert ESM-2 embedding chunk {{h5chunk}} into a FAISS index."

  - id: merge
    action: compute
    script: workflows/esm2-poc/scripts/merge.sh
    collects: faiss
    prompt: "Report ESM-2 FAISS index stats."

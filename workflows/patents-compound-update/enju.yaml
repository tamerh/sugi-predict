name: "patent_compounds — build/refresh (unified, deferred-index window)"
description: |
  Build/refresh the unified patent_compounds collection on a SureChEMBL snapshot. Replaces the bash-atlas
  compound stages. DAG: chunk -> predict (fused k-NN, GPU/tmux) -> [defer] ingest -> provenance -> denoise
  -> [build]. The defer/build tasks bracket all payload passes so they share ONE Qdrant optimization
  (the deferred-index window). mode=delta reuses work/atlas_nbrs/ and predicts only June-new compounds.
  Compute is bioyoda.sh build compounds <stage> (single source of truth for the stage logic).
version: 1
publish: {mode: none}
params:
  - {name: snapshot,   type: string, required: true,  description: "SureChEMBL snapshot dir (raw_data/patents/surechembl/<release>)"}
  - {name: collection, type: string, required: false, description: "target collection (default patent_compounds)"}
  - {name: mode,       type: string, required: false, description: "full | delta (default delta)"}
tasks:
  - {id: chunk,                    script: workflows/patents-compound-update/scripts/chunk.sh,      prompt: "Split snapshot compounds into chunks."}
  - {id: predict,  needs: [chunk], script: workflows/patents-compound-update/scripts/predict.sh,    prompt: "Fused k-NN K=100 -> work/atlas_nbrs/ (GPU, tmux). delta = only new compounds."}
  - {id: defer,    needs: [predict],   script: workflows/patents-compound-update/scripts/defer.sh,      prompt: "Open the deferred-index window (pause Qdrant indexing)."}
  - {id: ingest,   needs: [defer],     script: workflows/patents-compound-update/scripts/ingest.sh,     prompt: "Ingest all compounds (structure+FP) + enrich drug-like (predictions)."}
  - {id: provenance, needs: [ingest],  script: workflows/patents-compound-update/scripts/provenance.sh, prompt: "Bake patent provenance (foundational+frontier span)."}
  - {id: denoise,  needs: [provenance],script: workflows/patents-compound-update/scripts/denoise.sh,    prompt: "De-noise target memberships (floor+cap)."}
  - {id: build,    needs: [denoise],   script: workflows/patents-compound-update/scripts/build.sh,      prompt: "Single HNSW build (close the deferred-index window)."}

name: "PubMed PoC — Enju migration"
description: |
  BioYoda pubmed module as an Enju DAG:
    prepare (compute, singular) — stage XML files (fixture)
    index   (compute, fan-out per file) — index.py -> S-BioBERT -> FAISS
    merge   (compute, fan-in via collects) — verify/aggregate indices
  Fan-out list (`files`) is driver-resolved (compute can't emit dynamic lists);
  for the fixture it's just ["test_abstracts"]. Outputs to test_out/pubmed_poc.
version: 1

publish:
  mode: none

params:
  - name: files
    type: list<string>
    required: true
    description: "XML basenames (without .xml.gz) to index in parallel. Driver-resolved from the staged baseline dir."

defaults:
  assign_to: tamerh

tasks:
  - id: prepare
    action: compute
    script: workflows/pubmed-poc/scripts/prepare.sh
    prompt: "Stage PubMed XML fixture into test_out/pubmed_poc."

  - id: index
    action: compute
    script: workflows/pubmed-poc/scripts/index.sh
    depends_on: [prepare]
    for_each:
      file: "{{files}}"
    prompt: "Index PubMed file {{file}} with S-BioBERT into FAISS."

  - id: merge
    action: compute
    script: workflows/pubmed-poc/scripts/merge.sh
    collects: index
    prompt: "Verify and aggregate all per-file FAISS indices."

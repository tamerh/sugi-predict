name: "Fan-out scale test (pubmed-shaped)"
description: |
  Orchestration-capacity test: fan out over ~1334 no-op tasks (the pubmed
  2026-baseline file count) to verify Enju handles the iteration/branch/lock
  load before the real pubmed update. No embedding, no downloads.
version: 1
publish:
  mode: none
params:
  - name: items
    type: list<string>
    required: true
    description: "Fan-out items (file-name stand-ins)."
defaults:
  assign_to: tamerh
tasks:
  - id: work
    action: compute
    script: workflows/scale-test/scripts/noop.sh
    for_each:
      item: "{{items}}"
    prompt: "noop {{item}}"
  - id: done
    action: compute
    script: workflows/scale-test/scripts/done.sh
    collects: work
    prompt: "aggregate"

name: "Qdrant Insert PoC — Enju migration"
description: |
  BioYoda qdrant insertion stage as an Enju DAG:
    insert (compute, fan-out per collection) — insert_from_faiss.py into Qdrant
    verify (compute, collects) — report per-collection point counts
  Targets an isolated test Qdrant (test_out/qdrant_poc). Outputs to test_out/qdrant_poc.
version: 1
publish:
  mode: none
params:
  - name: collections
    type: list<string>
    required: true
    description: "Module collections to insert (pubmed, esm2). Driver-resolved from produced FAISS dirs."
defaults:
  assign_to: tamerh
tasks:
  - id: insert
    action: compute
    script: workflows/qdrant-insert-poc/scripts/insert.sh
    for_each:
      collection: "{{collections}}"
    prompt: "Insert {{collection}} FAISS index into Qdrant."
  - id: verify
    action: compute
    script: workflows/qdrant-insert-poc/scripts/verify.sh
    collects: insert
    prompt: "Report inserted collection point counts."

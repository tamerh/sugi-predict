name: "PubMed update — PMID-delta embed (batched)"
description: |
  Refresh pubmed_abstracts to the latest release. Fans out over BOTH baseline/ and
  updatefiles/ in one pass (mirrors the Snakemake pubmed_download checkpoint).
  Batched per the scale test (~33 batch-tasks of ~45 files, NOT one-file-per-task).
  Each batch runs index.py --existing-pmids so only NEW PMIDs are embedded; the
  already-embedded set is skipped. Output -> work/data/processed/pubmed/embeddings.
  Throttled (2 threads/task; run --parallel 8). Qdrant insert is a deliberate
  follow-up step, not in this DAG.
  NOTE: until the long-task run-desync bug (enju longtask-parallel-run-desync.bug.md)
  is fixed, the embedding-heavy batches may desync Enju bookkeeping — outputs still
  land on disk (index.py is idempotent); verify on disk and re-run/insert from there.
version: 1
publish:
  mode: none
params:
  - name: batches
    type: list<string>
    required: true
    description: 'Batch ids "00".."NN" (set after download from file count / batch size 45).'
defaults:
  assign_to: tamerh
tasks:
  - id: process
    action: compute
    script: workflows/pubmed-update/scripts/process.sh
    for_each:
      batch: "{{batches}}"
    prompt: "Embed pubmed baseline batch {{batch}} (PMID-delta)."
  - id: report
    action: compute
    script: workflows/pubmed-update/scripts/report.sh
    collects: process
    prompt: "Count new vectors produced."

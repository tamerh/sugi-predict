name: "Patents PoC — Enju migration"
description: |
  BioYoda patents module (two pipelines) as an Enju DAG, on real SureChEMBL slices:
    prepare  (compute) — make output dirs
    text     (compute) — process_patents.py (S-BioBERT, --limit 200)
    compound (compute, fan-out per chunk) — process_compounds.py (Morgan/RDKit, CPU)
    merge    (compute, collects compound + depends text) — report
  Demonstrates both the GPU-ideal text path (CPU-runnable at this size) and the
  CPU compound path. Outputs to test_out/patents_poc.
version: 1

publish:
  mode: none

params:
  - name: compound_chunks
    type: list<string>
    required: true
    description: "Compound chunk ids (e.g. 0002,0005) from chunked_compounds/. Driver-resolved."

defaults:
  assign_to: tamerh

tasks:
  - id: prepare
    action: compute
    script: workflows/patents-poc/scripts/prepare.sh
    prompt: "Prepare patents PoC output dirs."

  - id: text
    action: compute
    script: workflows/patents-poc/scripts/text.sh
    depends_on: [prepare]
    prompt: "Embed a slice of patent text with S-BioBERT into FAISS."

  - id: compound
    action: compute
    script: workflows/patents-poc/scripts/compound.sh
    depends_on: [prepare]
    for_each:
      chunk: "{{compound_chunks}}"
    prompt: "Fingerprint compound chunk {{chunk}} with RDKit Morgan into FAISS."

  - id: merge
    action: compute
    script: workflows/patents-poc/scripts/merge.sh
    depends_on: [text]
    collects: compound
    prompt: "Report text + compound index stats."

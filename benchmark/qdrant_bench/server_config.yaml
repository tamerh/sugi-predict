# Standard Qdrant Server Configuration
# Collection-specific settings (HNSW, segments) are set during collection creation, not here

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  enable_cors: true
  max_request_timeout_sec: 300

storage:
  storage_path: /qdrant/storage

  # WAL settings
  wal_capacity_mb: 512
  wal_segments_ahead: 2

  performance:
    max_search_threads: 0  # Use all available CPU cores (search parallelization)
    max_optimization_threads: 8  # Increased from 4 - speeds up index building & segment optimization

cluster:
  enabled: false

log_level: INFO
